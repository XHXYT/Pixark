name: HarmonyOS App Build

# === 触发条件：只推 tag 时才构建和发布 ===
on:
  push:
    tags:
      - "v*"   # 例如 v1.0.0

# == 构建作业 ==
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 缓存鸿蒙命令行工具
      - name: Cache Command Line Tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ./command-line-tools
          key: ${{ runner.os }}-harmony-tools-6.1.0.816

      # 下载工具链（如果缓存未命中）
      - name: Download Command Line Tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss, downloading tools..."
          curl -L -o tools.zip https://github.com/Okysu/harmony-auto-build/releases/download/commandline-tools-linux-x64-6.1.0.816/commandline-tools-linux-x64-6.1.0.816.zip
          unzip tools.zip
          rm tools.zip

      # 配置构建环境
      - name: Setup Build Environment
        run: |
          TOOLS_DIR=$(pwd)/command-line-tools
          echo "hwsdk.dir=$TOOLS_DIR/sdk" > local.properties
          echo "$TOOLS_DIR/bin" >> $GITHUB_PATH
          echo "OHPM_HOME=$TOOLS_DIR/ohpm" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=$TOOLS_DIR/sdk" >> $GITHUB_ENV
          chmod -R +x $TOOLS_DIR/bin

      # 安装依赖
      - name: Install Dependencies
        run: ohpm install

      # 构建 HAP
      - name: Build HAP (Debug Mode)
        run: |
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug --no-daemon

      # 上传构建产物给 release job 使用
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-app-debug
          path: |
            **/build/**/outputs/**/*.hap
            **/build/**/outputs/**/*.app
            **/build/**/outputs/**/*.hsp
            **/build/**/outputs/**/*.har

  # == 发布作业 ==
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限来创建 Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 获取版本号（去掉 tag 前面的 v）
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 下载构建产物
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: harmony-app-debug
          path: build-artifacts

      # 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Release 标题不带 v
          name: ${{ steps.get_version.outputs.VERSION }}
          # 从 CHANGELOG.md 读取发布说明
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          # 直接上传解压后的原始文件
          files: |
            build-artifacts/**/*.hap
            build-artifacts/**/*.app
            build-artifacts/**/*.hsp
            build-artifacts/**/*.har
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
