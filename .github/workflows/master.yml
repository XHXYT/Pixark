name: HarmonyOS App Build

# ========== 触发条件：推 tag 或手动触发 ==========
on:
  push:
    tags:
      - "v*"   # 推 tag 时自动触发（如 v1.0.0）
  workflow_dispatch:  # 新增：允许手动触发
    inputs:
      reason:
        description: '手动触发原因（可选）'
        required: false
        default: '手动构建测试'

# ========== 构建作业 ==========
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉代码
      - name: Checkout code
        uses: actions/checkout@v5   # 升级到 v5，支持 Node 24

      # 2. 安装 Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v6   # 升级到 v6，支持 Node 24
        with:
          node-version: "18"

      # 3. 缓存鸿蒙命令行工具
      - name: Cache Command Line Tools
        id: cache-tools
        uses: actions/cache@v5   # 升级到 v5，支持 Node 24
        with:
          path: ./command-line-tools
          key: ${{ runner.os }}-harmony-tools-6.1.0.816

      # 4. 下载工具链（如果缓存未命中）
      - name: Download Command Line Tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss, downloading tools..."
          curl -L -o tools.zip https://github.com/Okysu/harmony-auto-build/releases/download/commandline-tools-linux-x64-6.1.0.816/commandline-tools-linux-x64-6.1.0.816.zip
          unzip tools.zip
          rm tools.zip

      # 5. 配置构建环境
      - name: Setup Build Environment
        run: |
          TOOLS_DIR=$(pwd)/command-line-tools
          echo "hwsdk.dir=$TOOLS_DIR/sdk" > local.properties
          echo "$TOOLS_DIR/bin" >> $GITHUB_PATH
          echo "OHPM_HOME=$TOOLS_DIR/ohpm" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=$TOOLS_DIR/sdk" >> $GITHUB_ENV
          chmod -R +x $TOOLS_DIR/bin

      # 6. 安装依赖（加自动重试，避免 503 直接挂）
      - name: Install Dependencies
        run: |
          for i in 1 2 3; do
            ohpm install && break || echo "ohpm install failed, retrying in 10 seconds... ($i/3)" && sleep 10
          done

      # 7. 构建 HAP
      - name: Build HAP (Debug Mode)
        run: |
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug --no-daemon

      # 8. 上传构建产物给 release job 使用
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6   # 升级到 v6，支持 Node 24
        with:
          name: harmony-app-debug
          path: |
            **/build/**/outputs/**/*.hap
            **/build/**/outputs/**/*.app
            **/build/**/outputs/**/*.hsp
            **/build/**/outputs/**/*.har

  # ========== 发布作业 ==========
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限来创建 Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v5   # 升级到 v5，支持 Node 24

      # 获取版本号（去掉 tag 前面的 v）
      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=manual-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      # 下载构建产物
      - name: Download build artifacts
        uses: actions/download-artifact@v4   # v4 还在 Node 20，但暂时可用
        with:
          name: harmony-app-debug
          path: build-artifacts

      # 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Release 标题：tag 触发用版本号，手动触发用时间戳
          name: ${{ steps.get_version.outputs.VERSION }}
          # 从 CHANGELOG.md 读取发布说明
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          # 直接上传解压后的原始文件
          files: |
            build-artifacts/**/*.hap
            build-artifacts/**/*.app
            build-artifacts/**/*.hsp
            build-artifacts/**/*.har
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
